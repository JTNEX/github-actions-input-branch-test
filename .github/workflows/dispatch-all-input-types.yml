name: "Test 01 - All Input Types"

on:
  workflow_dispatch:
    inputs:
      text_input:
        description: "string (required)"
        required: true
        type: string
      choice_input:
        description: "choice (required)"
        required: true
        type: choice
        options:
          - alpha
          - beta
          - gamma
      bool_input:
        description: "boolean (optional, default false when unchecked)"
        required: false
        type: boolean
        default: false
      env_input:
        description: "environment (optional)"
        required: false
        type: environment

jobs:
  report:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env_input }}
    steps:
      - name: "REPORT | Test01 All Input Types"
        run: |
          echo "SUMMARY | TEST=01 | NAME=AllInputTypes | BRANCH=${{ github.ref_name }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "[INPUT] text_input   (required string)  => '${{ inputs.text_input }}'"
          echo "[INPUT] choice_input (required choice)  => '${{ inputs.choice_input }}'  (allowed: alpha/beta/gamma)"
          echo "[INPUT] bool_input   (optional bool)    => '${{ inputs.bool_input }}'  (unchecked => false)"
          echo "[INPUT] env_input    (optional env)     => '${{ inputs.env_input }}'  (empty => no environment job)"
          echo ""
          echo "[BRANCH] ref           => ${{ github.ref }}"
          echo "[BRANCH] ref_name      => ${{ github.ref_name }}"
          echo "[BRANCH] sha           => ${{ github.sha }}"
          echo "[BRANCH] workflow_ref  => ${{ github.workflow_ref }}"
          echo ""
          echo "VERDICT | text_input_not_empty=$([ -n '${{ inputs.text_input }}' ] && echo YES || echo NO)"
          echo "VERDICT | choice_input_is_one_of_alpha_beta_gamma=$([ '${{ inputs.choice_input }}' = alpha ] || [ '${{ inputs.choice_input }}' = beta ] || [ '${{ inputs.choice_input }}' = gamma ] && echo YES || echo NO)"
          echo "VERDICT | bool_input_is_true_or_false=$([ '${{ inputs.bool_input }}' = true ] || [ '${{ inputs.bool_input }}' = false ] && echo YES || echo NO)"
          echo "VERDICT | env_input_selected=$([ -n '${{ inputs.env_input }}' ] && echo YES || echo NO)"
          echo ""
          echo "HINT | ログ検索: SUMMARY | TEST=01 または VERDICT |"
