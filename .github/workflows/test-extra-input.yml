name: "Test 05 - Extra Input (feature adds input)"

on:
  workflow_dispatch:
    inputs:
      common_input:
        description: "main と feature 両方にある input"
        required: false
        type: string
        default: "from-feature-yaml"
      feature_only_input:
        description: "feature ブランチにだけ存在する input（UI に出るか？）"
        required: false
        type: string
        default: "from-feature-yaml"

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "REPORT | Test05 Extra Input"
        run: |
          echo "SUMMARY | TEST=05 | NAME=ExtraInput | BRANCH=${{ github.ref_name }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "[INPUT] common_input         => '${{ inputs.common_input }}'"
          echo "[INPUT] feature_only_input   => '${{ inputs.feature_only_input }}'"
          echo ""
          echo "[FILE] inputs defined in this branch's YAML:"
          sed -n '/^on:/,/^jobs:/p' .github/workflows/test-extra-input.yml | head -n 25
          echo ""
          if [ -z '${{ inputs.feature_only_input }}' ]; then
            echo "VERDICT | feature_only_input_received=NO (empty or not sent)"
          else
            echo "VERDICT | feature_only_input_received=YES value='${{ inputs.feature_only_input }}'"
          fi
          echo ""
          echo "VERDICT | yaml_has_feature_only_input=YES"
          echo "HINT | UI に feature_only_input が無くても CLI -f で渡せば YES になる"
