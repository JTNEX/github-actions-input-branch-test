name: "Test 05 - Extra Input (main baseline)"

on:
  workflow_dispatch:
    inputs:
      common_input:
        description: "main と feature 両方にある input"
        required: false
        type: string
        default: "from-main-yaml"

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "REPORT | Test05 Extra Input"
        run: |
          echo "SUMMARY | TEST=05 | NAME=ExtraInput | BRANCH=${{ github.ref_name }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "[INPUT] common_input         => '${{ inputs.common_input }}'"
          echo "[INPUT] feature_only_input   => '${{ inputs.feature_only_input }}'"
          echo ""
          echo "[FILE] inputs defined in this branch's YAML:"
          sed -n '/^on:/,/^jobs:/p' .github/workflows/test-extra-input.yml | head -n 20
          echo ""
          if [ -z '${{ inputs.feature_only_input }}' ]; then
            echo "VERDICT | feature_only_input_received=NO (empty or not sent)"
          else
            echo "VERDICT | feature_only_input_received=YES value='${{ inputs.feature_only_input }}'"
          fi
          echo ""
          echo "HINT | feature ブランチでは feature_only_input が YAML にあるが UI に出るかは手動確認"
          echo "HINT | gh workflow run で -f feature_only_input=cli-value を付ければ実行時は渡せる"
