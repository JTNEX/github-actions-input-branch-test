name: "Test 03 - Branch Context"

on:
  workflow_dispatch:
    inputs:
      note:
        description: "任意メモ（ログ識別用）"
        required: false
        type: string
        default: "no-note"

jobs:
  branch-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "REPORT | Test03 Branch Context"
        run: |
          PR_DUMMY_MARKER=$(grep -E 'VERSION=|Main dummy|Feature enhanced' .github/workflows/pr-test-dummy.yml | head -1 || echo "unknown")

          echo "SUMMARY | TEST=03 | NAME=BranchContext | BRANCH=${{ github.ref_name }} | NOTE=${{ inputs.note }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "[INPUT] note => '${{ inputs.note }}'"
          echo ""
          echo "[BRANCH] event_name   => ${{ github.event_name }}"
          echo "[BRANCH] ref          => ${{ github.ref }}"
          echo "[BRANCH] ref_name     => ${{ github.ref_name }}"
          echo "[BRANCH] sha          => ${{ github.sha }}"
          echo "[BRANCH] workflow     => ${{ github.workflow }}"
          echo "[BRANCH] workflow_ref => ${{ github.workflow_ref }}"
          echo ""
          echo "[FILE] dispatch-branch-context.yml (先頭5行)"
          head -n 5 .github/workflows/dispatch-branch-context.yml | sed 's/^/  /'
          echo ""
          echo "[FILE] pr-test-dummy.yml ブランチ識別行 => ${PR_DUMMY_MARKER}"
          echo ""
          case "${{ github.ref_name }}" in
            main)
              echo "VERDICT | expected_ref_name=main | actual=${{ github.ref_name }} | match=YES"
              echo "VERDICT | expected_pr_dummy=VERSION=MAIN_DUMMY (mainで手動実行時)"
              ;;
            feature/dispatch-defaults-b)
              echo "VERDICT | expected_ref_name=feature/dispatch-defaults-b | actual=${{ github.ref_name }} | match=YES"
              ;;
            feature/enhanced-pr-test)
              echo "VERDICT | expected_ref_name=feature/enhanced-pr-test | actual=${{ github.ref_name }} | match=YES"
              echo "VERDICT | expected_pr_dummy=VERSION=FEATURE_ENHANCED"
              ;;
            *)
              echo "VERDICT | ref_name=${{ github.ref_name }} (custom branch)"
              ;;
          esac
          echo ""
          echo "HINT | 2回実行して ref_name / FILE行 を比較するとブランチ差分が一目でわかる"
          echo "HINT | ログ検索: SUMMARY | TEST=03"
