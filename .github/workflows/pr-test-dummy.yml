name: "PR Test (Dummy on Main)"

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  placeholder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "REPORT | PR Test Dummy (feature enhanced version)"
        run: |
          echo "SUMMARY | TEST=PR | NAME=PrDummy | SOURCE=FEATURE | BRANCH=${{ github.ref_name }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "VERDICT | workflow_version=FEATURE_ENHANCED"
          echo "VERDICT | meaning=PRブランチ側の拡張版が実行された（mainダミーではない）"
          echo "VERDICT | pr_event=$([ '${{ github.event_name }}' = pull_request ] && echo YES || echo NO)"
          echo ""
          echo "[BRANCH] ref_name => ${{ github.ref_name }}"
          echo "[FILE] pr-test-dummy.yml (先頭8行)"
          head -n 8 .github/workflows/pr-test-dummy.yml | sed 's/^/  /'
          echo ""
          echo "HINT | MAIN_DUMMY ではなく FEATURE_ENHANCED が出ていれば PR検証成功"
          echo "HINT | ログ検索: SUMMARY | TEST=PR または VERDICT | workflow_version=FEATURE_ENHANCED"
