name: "PR Test (Dummy on Main)"

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  placeholder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "REPORT | PR Test Dummy (main version)"
        run: |
          echo "SUMMARY | TEST=PR | NAME=PrDummy | SOURCE=MAIN | BRANCH=${{ github.ref_name }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "VERDICT | workflow_version=MAIN_DUMMY"
          echo "VERDICT | meaning=main に置いたプレースホルダ版が実行された"
          echo "VERDICT | pr_event=$([ '${{ github.event_name }}' = pull_request ] && echo YES || echo NO)"
          echo ""
          echo "[BRANCH] ref_name => ${{ github.ref_name }}"
          echo "[FILE] pr-test-dummy.yml (先頭8行)"
          head -n 8 .github/workflows/pr-test-dummy.yml | sed 's/^/  /'
          echo ""
          echo "HINT | PRでは FEATURE_ENHANCED が出れば PRブランチ版が使われている証拠"
          echo "HINT | ログ検索: SUMMARY | TEST=PR または VERDICT | workflow_version="
